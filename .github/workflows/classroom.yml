name: GitHub Classroom Workflow

on:
  push:
    tags:
      - entrega-final

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - uses: education/autograding@v1
